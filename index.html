<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 無限獵熊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { overflow: hidden; background: #000; font-family: 'Microsoft JhengHei', 'Arial', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; touch-action: none; }

        /* UI 面板 */
        #scoreBoard {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            padding: 8px 14px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4); color: #fff;
        }
        #scoreBoard h2 { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        #scoreBoard .score { font-size: 22px; font-weight: bold; color: #FFD700; text-shadow: 0 2px 8px rgba(255,215,0,0.4); }

        #ui {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            padding: 8px 14px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        #backpack {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 2px solid #D2691E;
            box-shadow: 0 4px 12px rgba(139,69,19,0.5);
            transition: transform 0.15s;
        }
        #meatCount { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.5); min-width: 30px; text-align: center; }
        #meatIcon { font-size: 18px; }

        /* 操作提示 - 電腦版 */
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            padding: 6px 16px; border-radius: 10px;
            color: rgba(255,255,255,0.6); font-size: 11px;
            pointer-events: none; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #controls span { color: #FFD700; font-weight: bold; }

        /* 攻擊範圍指示器 */
        #attackRange {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 100; pointer-events: none;
            display: flex; align-items: center; gap: 6px;
            opacity: 0; transition: opacity 0.2s;
        }
        #attackRange.active { opacity: 1; }
        #attackRangeDot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #FF4444;
            box-shadow: 0 0 8px #FF4444;
            animation: pulse 0.6s infinite alternate;
        }
        #attackRangeText { color: #FF8888; font-size: 11px; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

        @keyframes pulse {
            from { transform: scale(0.8); opacity: 0.6; }
            to { transform: scale(1.2); opacity: 1; }
        }

        /* 攻擊命中提示 */
        .hitMarker {
            position: fixed; pointer-events: none; z-index: 200;
            color: #FF4444; font-size: 20px; font-weight: bold;
            text-shadow: 0 0 10px rgba(255,0,0,0.8);
            animation: hitFloat 0.8s forwards;
        }
        @keyframes hitFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* 冷卻指示條 */
        #cooldownBar {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            z-index: 100; pointer-events: none;
            width: 100px; height: 3px; background: rgba(255,255,255,0.15);
            border-radius: 2px; overflow: hidden; opacity: 0; transition: opacity 0.2s;
        }
        #cooldownBar.active { opacity: 1; }
        #cooldownFill {
            height: 100%; width: 100%; background: #FFD700;
            border-radius: 2px; transition: width 0.05s linear;
        }

        /* ============ 虛擬搖桿 ============ */
        #joystickArea {
            position: fixed; bottom: 20px; left: 20px;
            width: 130px; height: 130px; z-index: 150;
            display: none; /* 手機上才顯示 */
        }
        #joystickBase {
            position: absolute; width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.25);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        #joystickThumb {
            position: absolute; width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            border: 2px solid rgba(255,255,255,0.5);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            transition: none;
        }
        #joystickLabel {
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.3); font-size: 10px; white-space: nowrap;
        }

        /* ============ 攻擊按鈕 ============ */
        #attackBtn {
            position: fixed; bottom: 30px; right: 30px;
            width: 70px; height: 70px; border-radius: 50%; z-index: 150;
            background: rgba(255,50,50,0.3);
            border: 3px solid rgba(255,100,100,0.6);
            display: none; /* 手機上才顯示 */
            align-items: center; justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
            transition: transform 0.1s, background 0.1s;
        }
        #attackBtn:active {
            transform: scale(0.9);
            background: rgba(255,50,50,0.6);
        }

        /* ============ 電腦/手機偵測提示 ============ */
        #deviceHint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 300; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            padding: 30px 40px; border-radius: 20px;
            border: 2px solid rgba(255,215,0,0.4);
            color: #fff; text-align: center;
            display: none;
        }
        #deviceHint h2 { color: #FFD700; margin-bottom: 10px; font-size: 18px; }
        #deviceHint p { font-size: 14px; color: #ccc; margin: 6px 0; }
        #deviceHint .emoji { font-size: 40px; margin-bottom: 10px; }
        #deviceHint button {
            margin-top: 15px; padding: 10px 30px; border-radius: 10px;
            background: #FFD700; color: #333; border: none;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }

        /* 手機模式樣式 */
        @media (max-width: 768px) {
            #joystickArea { display: block !important; }
            #attackBtn { display: flex !important; }
            #controls { display: none; }
            #cooldownBar { bottom: 130px; }
            #attackRange { bottom: 160px; }
            #scoreBoard { top: 8px; left: 8px; padding: 6px 10px; }
            #scoreBoard h2 { font-size: 9px; }
            #scoreBoard .score { font-size: 18px; }
            #ui { top: 8px; right: 8px; padding: 6px 10px; gap: 6px; }
            #backpack { width: 32px; height: 32px; font-size: 16px; }
            #meatCount { font-size: 18px; }
            #meatIcon { font-size: 14px; }
        }
        @media (hover: none) and (pointer: coarse) {
            #joystickArea { display: block !important; }
            #attackBtn { display: flex !important; }
            #controls { display: none; }
            #cooldownBar { bottom: 130px; }
            #attackRange { bottom: 160px; }
            #scoreBoard { top: 8px; left: 8px; padding: 6px 10px; }
            #scoreBoard h2 { font-size: 9px; }
            #scoreBoard .score { font-size: 18px; }
            #ui { top: 8px; right: 8px; padding: 6px 10px; gap: 6px; }
            #backpack { width: 32px; height: 32px; font-size: 16px; }
            #meatCount { font-size: 18px; }
            #meatIcon { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="scoreBoard">
        <h2>獵殺數</h2>
        <div class="score" id="killCount">0</div>
    </div>
    <div id="ui">
        <div id="backpack">🎒</div>
        <span id="meatIcon">🥩</span>
        <span id="meatCount">0</span>
    </div>
    <div id="controls">
        <span>WASD</span> / <span>方向鍵</span> 移動 ｜ 靠近熊會自動攻擊！
    </div>
    <div id="attackRange"><div id="attackRangeDot"></div><span id="attackRangeText">接近獵物中...</span></div>
    <div id="cooldownBar"><div id="cooldownFill"></div></div>

    <!-- 虛擬搖桿 -->
    <div id="joystickArea">
        <div id="joystickLabel">移動</div>
        <div id="joystickBase"></div>
        <div id="joystickThumb"></div>
    </div>

    <!-- 攻擊按鈕 -->
    <div id="attackBtn">⚔️</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // ============ 全域變數 ============
        let scene, camera, renderer;
        let raycaster, mouse;
        let bears = [];
        let meatDrops = [];
        let killScore = 0;
        let meatCount = 0;
        let player;
        let keys = {};
        let lockedBear = null;
        const GROUND_SIZE = 40;
        const PLAYER_SPEED = 12;
        const CAMERA_HEIGHT = 12;
        const CAMERA_DISTANCE = 15;
        const SPAWN_DELAY = 0.5;
        const FLY_DURATION = 1.0;
        const ATTACK_RANGE = 3;
        const ATTACK_COOLDOWN = 1200;
        let lastAttackTime = 0;
        let isAttacking = false;
        let cameraTarget = new THREE.Vector3(0, 0, 0);

        // ============ 手機觸控 ============
        let joystickInput = { x: 0, y: 0 }; // -1 到 1
        let isJoystickActive = false;
        let joystickTouchId = null;
        let cameraTouchId = null;
        let cameraAngle = 0; // 攝影機繞角色的角度
        let cameraPitch = 0.7; // 攝影機仰角
        let lastCameraTouchX = 0;
        let lastCameraTouchY = 0;

        // 判斷是否為觸控裝置
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // ============ 初始化場景 ============
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.012);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
            sun.position.set(20, 35, 15);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            const d = 40;
            sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
            sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
            sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 100;
            sun.shadow.bias = -0.001;
            scene.add(sun);
            scene.add(new THREE.HemisphereLight(0x87CEEB, 0x4a7023, 0.35));

            createGround();
            createTrees();
            createRocks();
            createFlowers();

            player = createPlayer();
            player.position.set(0, 0, 0);
            scene.add(player);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            for (let i = 0; i < 3; i++) spawnBear();

            // 事件綁定
            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

            // 手機觸控事件
            setupTouchControls();

            animate();
        }

        // ============ 觸控控制設定 ============
        function setupTouchControls() {
            const joystickArea = document.getElementById('joystickArea');
            const joystickThumb = document.getElementById('joystickThumb');
            const attackBtn = document.getElementById('attackBtn');

            const JOYSTICK_RADIUS = 40;
            let joystickCenter = { x: 0, y: 0 };

            // 使用 document 級別的 touchstart 來捕獲所有觸控
            document.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    const el = document.elementFromPoint(touch.clientX, touch.clientY);

                    // 檢查是否觸控在搖桿區域
                    if (el && (el === joystickArea || el === joystickBase || el === joystickThumb || el === document.getElementById('joystickLabel') || joystickArea.contains(el))) {
                        e.preventDefault();
                        joystickTouchId = touch.identifier;
                        isJoystickActive = true;

                        const rect = joystickArea.getBoundingClientRect();
                        joystickCenter = {
                            x: rect.left + rect.width / 2,
                            y: rect.top + rect.height / 2
                        };
                        updateJoystick(touch.clientX, touch.clientY);
                        continue;
                    }

                    // 檢查是否觸控在攻擊按鈕
                    if (el && (el === attackBtn || attackBtn.contains(el))) {
                        e.preventDefault();
                        tryManualAttack();
                        continue;
                    }

                    // 右半螢幕 → 攝影機旋轉
                    if (touch.clientX > window.innerWidth / 2 && cameraTouchId === null) {
                        cameraTouchId = touch.identifier;
                        lastCameraTouchX = touch.clientX;
                        lastCameraTouchY = touch.clientY;
                    }
                }
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.touches.length; i++) {
                    // 虛擬搖桿移動
                    if (e.touches[i].identifier === joystickTouchId) {
                        e.preventDefault();
                        updateJoystick(e.touches[i].clientX, e.touches[i].clientY);
                    }
                    // 攝影機旋轉
                    if (e.touches[i].identifier === cameraTouchId) {
                        e.preventDefault();
                        const dx = e.touches[i].clientX - lastCameraTouchX;
                        const dy = e.touches[i].clientY - lastCameraTouchY;
                        cameraAngle -= dx * 0.005;
                        cameraPitch = Math.max(0.3, Math.min(1.2, cameraPitch + dy * 0.005));
                        lastCameraTouchX = e.touches[i].clientX;
                        lastCameraTouchY = e.touches[i].clientY;
                    }
                }
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === joystickTouchId) {
                        joystickTouchId = null;
                        isJoystickActive = false;
                        joystickInput.x = 0;
                        joystickInput.y = 0;
                        joystickThumb.style.transform = 'translate(-50%, -50%)';
                    }
                    if (touch.identifier === cameraTouchId) {
                        cameraTouchId = null;
                    }
                }
            }, { passive: false });

            document.addEventListener('touchcancel', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === joystickTouchId) {
                        joystickTouchId = null;
                        isJoystickActive = false;
                        joystickInput.x = 0;
                        joystickInput.y = 0;
                        joystickThumb.style.transform = 'translate(-50%, -50%)';
                    }
                    if (touch.identifier === cameraTouchId) {
                        cameraTouchId = null;
                    }
                }
            }, { passive: false });

            function updateJoystick(touchX, touchY) {
                let dx = touchX - joystickCenter.x;
                let dy = touchY - joystickCenter.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > JOYSTICK_RADIUS) {
                    dx = dx / dist * JOYSTICK_RADIUS;
                    dy = dy / dist * JOYSTICK_RADIUS;
                }

                joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

                joystickInput.x = dx / JOYSTICK_RADIUS;
                joystickInput.y = dy / JOYSTICK_RADIUS;
            }

            const joystickBase = document.getElementById('joystickBase');
        }

        // ============ 手動攻擊（按鈕觸發） ============
        function tryManualAttack() {
            const now = Date.now();
            if (isAttacking) return;
            if (now - lastAttackTime < ATTACK_COOLDOWN) return;

            let closest = null, minDist = ATTACK_RANGE;
            for (const b of bears) {
                if (b.userData.dying || b.userData.beingHit) continue;
                const d = player.position.distanceTo(b.position);
                if (d < minDist) { minDist = d; closest = b; }
            }

            if (!closest) return;

            isAttacking = true;
            lastAttackTime = now;
            player.userData.attacking = true;
            player.userData.attackTarget = closest;
            player.userData.attackStartTime = now;
            player.userData.attackDuration = 600;

            const dir = new THREE.Vector3().subVectors(closest.position, player.position);
            dir.y = 0;
            player.rotation.y = Math.atan2(dir.x, dir.z);
        }

        // ============ 主角角色 ============
        function createPlayer() {
            const g = new THREE.Group();
            g.userData.isPlayer = true;

            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x2266CC });
            const skinMat = new THREE.MeshLambertMaterial({ color: 0xFFD5B0 });
            const hairMat = new THREE.MeshLambertMaterial({ color: 0x332211 });
            const pantsMat = new THREE.MeshLambertMaterial({ color: 0x334455 });
            const shoeMat = new THREE.MeshLambertMaterial({ color: 0x553322 });

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), skinMat);
            head.position.y = 2.2; head.castShadow = true; g.add(head);
            const hair = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.35, 0.75), hairMat);
            hair.position.y = 2.55; hair.castShadow = true; g.add(hair);

            const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.05), eyeMat);
            eyeL.position.set(-0.15, 2.25, 0.36); g.add(eyeL);
            const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.05), eyeMat);
            eyeR.position.set(0.15, 2.25, 0.36); g.add(eyeR);

            const eyeWhiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const ewL = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.03), eyeWhiteMat);
            ewL.position.set(-0.15, 2.25, 0.35); g.add(ewL);
            const ewR = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.03), eyeWhiteMat);
            ewR.position.set(0.15, 2.25, 0.35); g.add(ewR);

            const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.06, 0.05), new THREE.MeshLambertMaterial({ color: 0xCC6666 }));
            mouth.position.set(0, 2.08, 0.36); g.add(mouth);

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.0, 0.5), bodyMat);
            body.position.y = 1.45; body.castShadow = true; g.add(body);

            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.85, 0.25), bodyMat);
            armL.position.set(-0.53, 1.5, 0); armL.castShadow = true; g.add(armL);
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.85, 0.25), bodyMat);
            armR.position.set(0.53, 1.5, 0); armR.castShadow = true; g.add(armR);

            const handL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), skinMat);
            handL.position.set(-0.53, 1.02, 0); g.add(handL);
            const handR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), skinMat);
            handR.position.set(0.53, 1.02, 0); g.add(handR);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.7, 0.32), pantsMat);
            legL.position.set(-0.2, 0.55, 0); legL.castShadow = true; g.add(legL);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.7, 0.32), pantsMat);
            legR.position.set(0.2, 0.55, 0); legR.castShadow = true; g.add(legR);

            const shoeL = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.18, 0.42), shoeMat);
            shoeL.position.set(-0.2, 0.1, 0.04); g.add(shoeL);
            const shoeR = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.18, 0.42), shoeMat);
            shoeR.position.set(0.2, 0.1, 0.04); g.add(shoeR);

            const axeGroup = new THREE.Group();
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 6), new THREE.MeshLambertMaterial({ color: 0x8B6914 }));
            handle.rotation.z = 0.3; axeGroup.add(handle);
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.06), new THREE.MeshLambertMaterial({ color: 0xAAAAAA }));
            blade.position.set(0.15, 0.3, 0); axeGroup.add(blade);
            axeGroup.position.set(0.72, 1.7, 0); g.add(axeGroup);

            g.userData.parts = { armL, armR, legL, legR, axeGroup };
            return g;
        }

        // ============ 創建草地 ============
        function createGround() {
            const g = new THREE.Mesh(
                new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, 60, 60),
                new THREE.MeshLambertMaterial({ color: 0x4a7023 })
            );
            g.rotation.x = -Math.PI / 2; g.receiveShadow = true; scene.add(g);

            const pColors = [0x5a8a2a, 0x3d6018, 0x6a9a35, 0x528020];
            for (let i = 0; i < 50; i++) {
                const pm = new THREE.Mesh(
                    new THREE.CircleGeometry(1 + Math.random() * 2, 8),
                    new THREE.MeshLambertMaterial({ color: pColors[i % pColors.length] })
                );
                pm.rotation.x = -Math.PI / 2;
                pm.position.set((Math.random() - 0.5) * GROUND_SIZE * 0.9, 0.01, (Math.random() - 0.5) * GROUND_SIZE * 0.9);
                pm.scale.set(0.8 + Math.random(), 0.8 + Math.random(), 1);
                scene.add(pm);
            }
        }

        // ============ 創建樹木 ============
        function createTrees() {
            const positions = [
                [-14, 0, -12], [-15, 0, 5], [14, 0, -9], [12, 0, 14],
                [-9, 0, 15], [15, 0, 3], [-15, 0, -4], [6, 0, -15],
                [-5, 0, 16], [16, 0, -3], [-16, 0, 10], [0, 0, -16],
                [7, 0, 15], [-12, 0, -14]
            ];
            positions.forEach(([x, y, z]) => {
                const t = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.4, 3, 8), new THREE.MeshLambertMaterial({ color: 0x6B3A1F }));
                trunk.position.y = 1.5; trunk.castShadow = true; t.add(trunk);
                const lc = [0x228B22, 0x2E8B2E, 0x1E7A1E];
                [[0, 4, 0], [-0.5, 3.5, 0.3], [0.4, 3.6, -0.3]].forEach(([lx, ly, lz], i) => {
                    const lf = new THREE.Mesh(new THREE.SphereGeometry(1.2 - i * 0.2, 8, 8), new THREE.MeshLambertMaterial({ color: lc[i] }));
                    lf.position.set(lx, ly, lz); lf.castShadow = true; t.add(lf);
                });
                t.position.set(x, y, z); scene.add(t);
            });
        }

        // ============ 創建石頭 ============
        function createRocks() {
            for (let i = 0; i < 15; i++) {
                const a = Math.random() * Math.PI * 2, d = 5 + Math.random() * 12;
                const r = new THREE.Mesh(
                    new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.5, 0),
                    new THREE.MeshLambertMaterial({ color: new THREE.Color(0.4 + Math.random() * 0.2, 0.4 + Math.random() * 0.2, 0.38 + Math.random() * 0.15) })
                );
                r.position.set(Math.cos(a) * d, 0.15, Math.sin(a) * d);
                r.rotation.set(Math.random(), Math.random(), Math.random());
                r.castShadow = true; scene.add(r);
            }
        }

        // ============ 創建花朵 ============
        function createFlowers() {
            const colors = [0xFF69B4, 0xFFD700, 0xFF6347, 0xDA70D6, 0x87CEEB, 0xFFFFFF];
            for (let i = 0; i < 40; i++) {
                const flower = new THREE.Group();
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4, 4), new THREE.MeshLambertMaterial({ color: 0x228B22 }));
                stem.position.y = 0.2; flower.add(stem);
                const petal = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random() * colors.length)] }));
                petal.position.y = 0.45; petal.scale.y = 0.6; flower.add(petal);
                const a = Math.random() * Math.PI * 2, d = 3 + Math.random() * 14;
                flower.position.set(Math.cos(a) * d, 0, Math.sin(a) * d);
                scene.add(flower);
            }
        }

        // ============ 創建熊 ============
        function createBear() {
            const bear = new THREE.Group();
            bear.userData.isBear = true;
            const bc = 0x8B4513, hc = 0x9B5523, bc2 = 0xD2B48C;

            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.4, 1.2), new THREE.MeshLambertMaterial({ color: bc }));
            body.position.y = 1.3; body.castShadow = true; bear.add(body);
            const belly = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.9, 0.1), new THREE.MeshLambertMaterial({ color: bc2 }));
            belly.position.set(0, 1.2, 0.65); bear.add(belly);
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.1, 1.0), new THREE.MeshLambertMaterial({ color: hc }));
            head.position.y = 2.55; head.castShadow = true; bear.add(head);

            [[-0.45, 3.1, 0], [0.45, 3.1, 0]].forEach(p => {
                const ear = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshLambertMaterial({ color: hc }));
                ear.position.set(...p); ear.castShadow = true; bear.add(ear);
            });
            [[-0.25, 2.65, 0.5], [0.25, 2.65, 0.5]].forEach(p => {
                const e = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), new THREE.MeshLambertMaterial({ color: 0x111111 }));
                e.position.set(...p); bear.add(e);
            });
            [[-0.23, 2.68, 0.56], [0.27, 2.68, 0.56]].forEach(p => {
                const ew = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), new THREE.MeshLambertMaterial({ color: 0xffffff }));
                ew.position.set(...p); bear.add(ew);
            });
            const nose = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.15, 0.15), new THREE.MeshLambertMaterial({ color: 0x222222 }));
            nose.position.set(0, 2.45, 0.55); bear.add(nose);

            [[-1.05, 1.4, 0], [1.05, 1.4, 0]].forEach(p => {
                const arm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.0, 0.5), new THREE.MeshLambertMaterial({ color: bc }));
                arm.position.set(...p); arm.castShadow = true; bear.add(arm);
            });
            [[-0.45, 0.35, 0], [0.45, 0.35, 0]].forEach(p => {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.6), new THREE.MeshLambertMaterial({ color: bc }));
                leg.position.set(...p); leg.castShadow = true; bear.add(leg);
            });
            [[-0.45, 0.15, 0.1], [0.45, 0.15, 0.1]].forEach(p => {
                const paw = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.8), new THREE.MeshLambertMaterial({ color: bc2 }));
                paw.position.set(...p); bear.add(paw);
            });
            const tail = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 6), new THREE.MeshLambertMaterial({ color: bc }));
            tail.position.set(0, 1.5, -0.7); bear.add(tail);

            return bear;
        }

        function spawnBear() {
            const bear = createBear();
            const half = GROUND_SIZE / 2 - 5;
            let x, z, tries = 0;
            do {
                x = (Math.random() - 0.5) * half * 2;
                z = (Math.random() - 0.5) * half * 2;
                tries++;
            } while (isTooClose(x, z) && tries < 50);

            bear.position.set(x, 0, z);
            bear.rotation.y = Math.random() * Math.PI * 2;
            bear.scale.set(0, 0, 0);
            bear.userData.spawnTime = Date.now();
            bear.userData.spawning = true;
            bear.userData.bobPhase = Math.random() * Math.PI * 2;
            scene.add(bear);
            bears.push(bear);
        }

        function isTooClose(x, z) {
            for (const b of bears) {
                const dx = b.position.x - x, dz = b.position.z - z;
                if (Math.sqrt(dx * dx + dz * dz) < 5) return true;
            }
            return false;
        }

        // ============ 自動攻擊熊 ============
        function tryAutoAttack() {
            const now = Date.now();
            if (isAttacking) return;
            if (now - lastAttackTime < ATTACK_COOLDOWN) return;

            let closest = null, minDist = ATTACK_RANGE;
            for (const b of bears) {
                if (b.userData.dying || b.userData.beingHit) continue;
                const d = player.position.distanceTo(b.position);
                if (d < minDist) { minDist = d; closest = b; }
            }
            if (!closest) return;

            isAttacking = true;
            lastAttackTime = now;
            player.userData.attacking = true;
            player.userData.attackTarget = closest;
            player.userData.attackStartTime = now;
            player.userData.attackDuration = 600;

            const dir = new THREE.Vector3().subVectors(closest.position, player.position);
            dir.y = 0;
            player.rotation.y = Math.atan2(dir.x, dir.z);
        }

        // ============ 攻擊命中處理 ============
        function onAttackHit(bear) {
            if (bear.userData.dying || bear.userData.beingHit) return;
            bear.userData.beingHit = true;
            bear.userData.hitStartTime = Date.now();
            bear.userData.hitDuration = 500;
            showDamageNumber(bear.position);
            createHitEffect(bear.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
            killScore++;
            document.getElementById('killCount').textContent = killScore;
        }

        // ============ 傷害數字 ============
        function showDamageNumber(worldPos) {
            const pos = worldPos.clone();
            pos.y = 3;
            pos.project(camera);
            const sx = (pos.x * 0.5 + 0.5) * window.innerWidth;
            const sy = (-pos.y * 0.5 + 0.5) * window.innerHeight;
            const el = document.createElement('div');
            el.className = 'hitMarker';
            el.textContent = '⚔️ -1';
            el.style.left = sx + 'px';
            el.style.top = sy + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // ============ 攻擊命中特效 ============
        function createHitEffect(position) {
            const flash = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0xFFFF00, transparent: true, opacity: 0.8 }));
            flash.position.copy(position); scene.add(flash);
            const particles = [];
            for (let i = 0; i < 6; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshBasicMaterial({ color: 0xFF8800, transparent: true, opacity: 1 }));
                p.position.copy(position);
                p.userData.vel = new THREE.Vector3((Math.random() - 0.5) * 4, Math.random() * 3 + 1, (Math.random() - 0.5) * 4);
                scene.add(p); particles.push(p);
            }
            const startTime = Date.now();
            function animParticles() {
                const t = (Date.now() - startTime) / 500;
                if (t >= 1) { scene.remove(flash); particles.forEach(p => scene.remove(p)); return; }
                flash.scale.set(1 + t * 2, 1 + t * 2, 1 + t * 2);
                flash.material.opacity = 0.8 * (1 - t);
                particles.forEach(p => {
                    p.position.add(p.userData.vel.clone().multiplyScalar(0.016));
                    p.userData.vel.y -= 9.8 * 0.016;
                    p.material.opacity = 1 - t; p.scale.setScalar(1 - t * 0.5);
                });
                requestAnimationFrame(animParticles);
            }
            animParticles();
        }

        // ============ 擊殺熊 ============
        function killBear(bear) {
            bear.userData.dying = true;
            bear.userData.deathStartTime = Date.now();
            bear.userData.deathPos = bear.position.clone();
            createMeatDrop(bear.position.clone());
            const idx = bears.indexOf(bear);
            if (idx > -1) bears.splice(idx, 1);
            setTimeout(spawnBear, SPAWN_DELAY * 1000);
        }

        // ============ 掉落物 ============
        function createMeatDrop(position) {
            const mg = new THREE.Group();
            const m1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshLambertMaterial({ color: 0xCC2222 }));
            m1.castShadow = true; mg.add(m1);
            const m2 = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), new THREE.MeshLambertMaterial({ color: 0xEE3333 }));
            m2.position.set(0.25, 0.25, 0); m2.castShadow = true; mg.add(m2);
            const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 6), new THREE.MeshLambertMaterial({ color: 0xFFFFF0 }));
            bone.rotation.z = Math.PI / 2; bone.position.set(-0.1, 0.35, 0); mg.add(bone);

            mg.position.copy(position); mg.position.y = 0.5;
            mg.scale.set(0, 0, 0); scene.add(mg);

            const md = { mesh: mg, spawnTime: Date.now(), collected: false, startPos: mg.position.clone(), flyStart: null };
            meatDrops.push(md);
            setTimeout(() => { if (!md.collected) { md.flyStart = Date.now(); md.collected = true; } }, 400);
        }

        // ============ 玩家移動 ============
        function updatePlayer(dt) {
            const now = Date.now();
            const moveDir = new THREE.Vector3();
            const canMove = !isAttacking;

            if (canMove) {
                // 鍵盤輸入
                if (keys['w'] || keys['arrowup']) moveDir.z -= 1;
                if (keys['s'] || keys['arrowdown']) moveDir.z += 1;
                if (keys['a'] || keys['arrowleft']) moveDir.x -= 1;
                if (keys['d'] || keys['arrowright']) moveDir.x += 1;

                // 虛擬搖桿輸入
                if (isJoystickActive && (Math.abs(joystickInput.x) > 0.1 || Math.abs(joystickInput.y) > 0.1)) {
                    moveDir.x += joystickInput.x;
                    moveDir.z += joystickInput.y; // 注意：搖桿 Y 軸方向
                }
            }

            if (moveDir.length() > 0) {
                moveDir.normalize();

                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                camDir.y = 0; camDir.normalize();
                const camRight = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0, 1, 0)).normalize();

                const worldMove = new THREE.Vector3();
                worldMove.addScaledVector(camRight, moveDir.x);
                worldMove.addScaledVector(camDir, -moveDir.z);
                worldMove.normalize();

                player.position.x += worldMove.x * PLAYER_SPEED * dt;
                player.position.z += worldMove.z * PLAYER_SPEED * dt;

                const limit = GROUND_SIZE / 2 - 2;
                player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
                player.position.z = Math.max(-limit, Math.min(limit, player.position.z));

                if (!isAttacking) {
                    const targetAngle = Math.atan2(worldMove.x, worldMove.z);
                    let current = player.rotation.y;
                    let diff = targetAngle - current;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    player.rotation.y += diff * 0.15;
                }

                player.userData.walking = true;
                player.userData.walkPhase = (player.userData.walkPhase || 0) + dt * 10;
                const phase = player.userData.walkPhase;
                const parts = player.userData.parts;
                parts.legL.position.z = Math.sin(phase) * 0.15;
                parts.legR.position.z = Math.sin(phase + Math.PI) * 0.15;
                parts.armL.rotation.x = Math.sin(phase + Math.PI) * 0.3;
                parts.armR.rotation.x = Math.sin(phase) * 0.3;
                player.position.y = Math.abs(Math.sin(phase)) * 0.1;
            } else {
                player.userData.walking = false;
                if (!isAttacking) {
                    const parts = player.userData.parts;
                    if (parts) {
                        parts.legL.position.z *= 0.85;
                        parts.legR.position.z *= 0.85;
                        parts.armL.rotation.x *= 0.85;
                        parts.armR.rotation.x *= 0.85;
                    }
                    player.position.y *= 0.9;
                }
            }

            // 攻擊動畫
            if (isAttacking) {
                const attackElapsed = now - player.userData.attackStartTime;
                const attackDuration = player.userData.attackDuration;
                const attackProgress = Math.min(attackElapsed / attackDuration, 1);
                const parts = player.userData.parts;

                if (attackProgress < 0.3) {
                    const t = attackProgress / 0.3;
                    parts.axeGroup.rotation.z = -t * 0.8;
                    parts.armR.rotation.x = -t * 0.6;
                } else if (attackProgress < 0.6) {
                    const t = (attackProgress - 0.3) / 0.3;
                    parts.axeGroup.rotation.z = -0.8 + t * 2.0;
                    parts.armR.rotation.x = -0.6 + t * 1.2;
                    if (t > 0.3 && !player.userData.hitDealt && player.userData.attackTarget) {
                        player.userData.hitDealt = true;
                        onAttackHit(player.userData.attackTarget);
                    }
                } else {
                    const t = (attackProgress - 0.6) / 0.4;
                    parts.axeGroup.rotation.z = 1.2 * (1 - t);
                    parts.armR.rotation.x = 0.6 * (1 - t);
                }

                if (attackProgress >= 1) {
                    isAttacking = false;
                    player.userData.attacking = false;
                    player.userData.hitDealt = false;
                    player.userData.attackTarget = null;
                    parts.axeGroup.rotation.z = 0;
                    parts.armR.rotation.x = 0;
                }
            }

            // 自動攻擊
            tryAutoAttack();

            // UI 更新
            updateCooldownUI(now);
            updateAttackRangeUI();

            // 攝影機更新
            updateCamera();
        }

        // ============ 攝影機更新 ============
        function updateCamera() {
            const camDist = CAMERA_DISTANCE;
            const camH = CAMERA_HEIGHT;

            // 用 cameraAngle 和 cameraPitch 計算攝影機位置
            const offsetX = Math.sin(cameraAngle) * camDist * Math.cos(cameraPitch);
            const offsetZ = Math.cos(cameraAngle) * camDist * Math.cos(cameraPitch);
            const offsetY = camH * Math.sin(cameraPitch) + 5;

            const camTargetPos = new THREE.Vector3(
                player.position.x + offsetX,
                player.position.y + offsetY,
                player.position.z + offsetZ
            );
            camera.position.lerp(camTargetPos, 0.1);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
        }

        // ============ 冷卻條 UI ============
        function updateCooldownUI(now) {
            const bar = document.getElementById('cooldownBar');
            const fill = document.getElementById('cooldownFill');
            const elapsed = now - lastAttackTime;
            if (elapsed < ATTACK_COOLDOWN) {
                bar.classList.add('active');
                fill.style.width = ((1 - elapsed / ATTACK_COOLDOWN) * 100) + '%';
            } else {
                bar.classList.remove('active');
            }
        }

        // ============ 攻擊範圍指示 ============
        function updateAttackRangeUI() {
            const indicator = document.getElementById('attackRange');
            let hasTarget = false;
            for (const b of bears) {
                if (b.userData.dying || b.userData.beingHit) continue;
                if (player.position.distanceTo(b.position) <= ATTACK_RANGE) { hasTarget = true; break; }
            }
            if (hasTarget && !isAttacking) indicator.classList.add('active');
            else indicator.classList.remove('active');
        }

        // ============ 視窗大小 ============
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============ 主動畫循環 ============
        let lastTime = Date.now();
        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            const dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            updatePlayer(dt);

            // 熊動畫
            for (let i = bears.length - 1; i >= 0; i--) {
                const bear = bears[i];

                if (bear.userData.spawning) {
                    const t = (now - bear.userData.spawnTime) / 500;
                    if (t >= 1) { bear.scale.set(1, 1, 1); bear.userData.spawning = false; }
                    else { const s = easeOutBack(t); bear.scale.set(s, s, s); }
                }

                if (bear.userData.beingHit && !bear.userData.dying) {
                    const t = (now - bear.userData.hitStartTime) / bear.userData.hitDuration;
                    if (t >= 1) { killBear(bear); continue; }
                    const easeT = easeInQuad(t);
                    bear.rotation.x = easeT * (Math.PI / 2);
                    bear.position.y = -easeT * 0.5;
                    const s = 1 - easeT * 0.3;
                    bear.scale.set(s, s, s);
                    bear.traverse(child => {
                        if (child.isMesh && child.material && !child.userData.colorSet) {
                            child.userData.originalColor = child.material.color.clone();
                            child.userData.colorSet = true;
                        }
                        if (child.isMesh && child.userData.originalColor) {
                            child.material.color.lerp(new THREE.Color(0xFF2222), easeT * 0.6);
                        }
                    });
                    continue;
                }

                if (bear.userData.dying) {
                    const t = (now - bear.userData.deathStartTime) / 400;
                    if (t >= 1) { scene.remove(bear); }
                    else {
                        const s = 1 - t;
                        bear.scale.set(s, s, s);
                        bear.position.y = bear.userData.deathPos.y + t * 2;
                        bear.rotation.y += 0.15;
                    }
                    continue;
                }

                bear.userData.bobPhase += 0.02;
                bear.position.y = Math.sin(bear.userData.bobPhase) * 0.05;

                const distToPlayer = player.position.distanceTo(bear.position);
                if (distToPlayer < 8 && distToPlayer > 2) {
                    const awayDir = new THREE.Vector3().subVectors(bear.position, player.position).normalize();
                    bear.position.x += awayDir.x * 4 * dt;
                    bear.position.z += awayDir.z * 4 * dt;
                    bear.rotation.y = Math.atan2(awayDir.x, awayDir.z);
                }
            }

            // 掉落物動畫
            for (let i = meatDrops.length - 1; i >= 0; i--) {
                const meat = meatDrops[i];
                if (!meat.collected) {
                    const t = (now - meat.spawnTime) / 300;
                    if (t >= 1) meat.mesh.scale.set(1, 1, 1);
                    else { const s = easeOutBack(t); meat.mesh.scale.set(s, s, s); }
                    meat.mesh.position.y = 0.5 + Math.sin(now * 0.005) * 0.15;
                    meat.mesh.rotation.y += 0.03;
                }
                if (meat.collected && meat.flyStart) {
                    const elapsed = (now - meat.flyStart) / (FLY_DURATION * 1000);
                    if (elapsed >= 1) {
                        scene.remove(meat.mesh);
                        meatDrops.splice(i, 1);
                        meatCount++;
                        document.getElementById('meatCount').textContent = meatCount;
                        const bp = document.getElementById('backpack');
                        bp.style.transform = 'scale(1.3)';
                        setTimeout(() => { bp.style.transform = 'scale(1)'; }, 150);
                    } else {
                        const p = easeInOutCubic(elapsed);
                        const endPos = new THREE.Vector3(player.position.x, 10, player.position.z);
                        const midPos = meat.startPos.clone(); midPos.y += 5;
                        const t1 = meat.startPos.clone().lerp(midPos, p);
                        const t2 = midPos.clone().lerp(endPos, p);
                        const finalPos = t1.lerp(t2, p);
                        meat.mesh.position.copy(finalPos);
                        meat.mesh.rotation.x += 0.1; meat.mesh.rotation.z += 0.08;
                        const s = 1 - p * 0.5;
                        meat.mesh.scale.set(s, s, s);
                        meat.mesh.traverse(c => { if (c.isMesh && c.material) { c.material.transparent = true; c.material.opacity = 1 - p * 0.5; } });
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // ============ 緩動函數 ============
        function easeOutBack(t) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }
        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function easeInQuad(t) { return t * t; }

        // 防止手機所有預設手勢
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());

        init();
    </script>
</body>
